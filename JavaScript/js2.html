	<!-- VOCABULARY
		1. Statement - something that performs an action
		2. Expression - something that produces a value (ex. logical expression if logical operators were used)
		3. Literal - raw value written directly (sample: "Hello" - string literal, 10 - number literal, true- boolean literal, null - null literal)
		4. Variable declaration - is when you create a variable using let or const. Ex: let total
		5. Primitives are basic, single-value data types. Hold one value only, are copied by value, cannot be mutated, have no internal properties you can change, can oly be reassigned:
			Primitives:
			number
			string
			boolean
			null
			undefined
			bigint
			symbol

			Non-primitives (reference types):
			object
			array
			function
		6. Initialization - is giving a variable its first value. It can happen: During declaration Or after declaration. Example 1 (during declaration): let score = 100; Example 2 (after declaration): let score; score = 100;
		7. Variable Declaration with initialization - is when the variable receives its first value. Ex: let check (variable decalaration only, value is still undefined). let check = 50; (variable declaration with initialization, value is now defined as 50).
		8. Initialization statement - is a statement where a variable is declared and assigned its first value in the same line.
		9. Invocation or calling a function - the act of executing a function.
		Ex: function greet() {
			console.log("Hi");
			}
			
			greet();
			
			greet → function reference
			greet() → function invocation
			Without parentheses, the function does not execute.

		10. First-Match Priority -
		    In an if / else if / else chain, JavaScript executes the FIRST condition
		    that evaluates to true and then stops checking the rest.
		    
		    This means:
		    - Order of conditions matters.
		    - Lower branches may never run.
		    - Broad conditions placed first can shadow specific ones.
		    
		    Example:
		        if (score >= 50)
		        else if (score >= 90)

		    If score = 95, the first condition runs and the 90 branch becomes unreachable.

		    Rule:
		    Always place the most specific or highest-priority condition first. 
		11. Guard Layering - means validating input BEFORE running business logic.

		    Structure:
		        1) Reject invalid data.
		        2) Then classify valid data.

		    Guards protect the system from logic leaks.

		    Example:
		        if (temperature > 60)
		        else if (temperature < -50)
		        else if (temperature >= 30)

		    If invalid checks are placed after classification,
		    invalid values may be misclassified instead of rejected.

		    Rule:
		    Always validate first. Classify second.  
		12. Descending Classification - means ordering conditions from
		    highest threshold to lowest threshold.

		    Structure:
		        else if (value >= 30)
		        else if (value >= 15)
		        else if (value >= 0)
		        else

		    This works because earlier conditions eliminate higher ranges,
		    so lower branches automatically represent compressed ranges.

		    Example:
		        If value = 20:
		            >= 30 → false
		            >= 15 → true → executes

		    We do NOT need to write:
		        value >= 15 && value < 30

		    Earlier conditions already removed >= 30.

		    Rule:
		    In range systems, go from highest boundary to lowest boundary.-->

		<!-- IF ELSE IF Multi-branch Priority Control 
			    else if's purpose is to create a prioritized decision tree.
			 Structure:

			 if (condition1) {
			   // runs if condition1 is true
			 } else if (condition2) {
			   // runs ONLY if condition1 is false AND condition2 is true
			 } else {
			   // runs if all above are false
			 }
			 
			 Important rule:

			 👉 JavaScript checks from top to bottom.
			 👉 The FIRST true condition runs.
			 👉 The rest are skipped.

			 This is called first-match priority. -->
